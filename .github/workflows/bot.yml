name: Skull Scanner Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
